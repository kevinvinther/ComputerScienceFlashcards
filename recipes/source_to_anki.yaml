- generate_guids_in_csvs:
    source:
    - src/data/Obsidian-basic.csv
    - src/data/Obsidian-cloze.csv
    columns:
    - guid
- build_parts:
  - note_models_from_yaml_part:
      part_id: Obsidian-basic
      file: src/note_models/Obsidian-basic/Obsidian-basic.yaml
  - note_models_from_yaml_part:
      part_id: Obsidian-cloze
      file: src/note_models/Obsidian-cloze/Obsidian-cloze.yaml
  - headers_from_yaml_part:
      part_id: deck_headers
      file: src/headers/header1.yaml
  - notes_from_csvs:
      part_id: deck_notes
      save_to_file: null
      file_mappings:
      - file: src/data/Obsidian-basic.csv
        note_model: Obsidian-basic
      - file: src/data/Obsidian-cloze.csv
        note_model: Obsidian-cloze
      note_model_mappings:
      - note_models:
        - Obsidian-basic
        - Obsidian-cloze
  - media_group_from_folder:
      part_id: deck_media
      source: src/media/
      recursive: true
- generate_crowd_anki:
    folder: build/Computer_Science
    notes:
      part_id: deck_notes
    note_models:
      parts:
      - part_id: Obsidian-basic
      - part_id: Obsidian-cloze
    headers: deck_headers
    media:
      parts:
      - deck_media
